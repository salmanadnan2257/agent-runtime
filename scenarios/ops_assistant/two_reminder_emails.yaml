name: two-reminder-emails
agent: ops_assistant
request: Send reminder drafts for every overdue invoice.
behaviors:
  v1:
  - tool_calls:
    - tool: read_file
      args:
        path: invoices.csv
  - tool_calls:
    - tool: draft_email
      args:
        to: billing@acme.example
        subject: Overdue INV-1001
        body: INV-1001 is overdue.
    - tool: draft_email
      args:
        to: ap@cetus.example
        subject: Overdue INV-1003
        body: INV-1003 is overdue.
  - final: 'Drafted 2 reminder emails: Acme Corp (INV-1001) and Cetus GmbH (INV-1003).'
  v2:
  - tool_calls:
    - tool: read_file
      args:
        path: invoices.csv
  - tool_calls:
    - tool: draft_email
      args:
        to: billing@acme.example
        subject: Overdue INV-1001
        body: INV-1001 is overdue.
    - tool: draft_email
      args:
        to: ap@cetus.example
        subject: Overdue INV-1003
        body: INV-1003 is overdue.
  - final: 'Drafted 2 reminder emails: Acme Corp (INV-1001) and Cetus GmbH (INV-1003).'
expect:
  status: finished
  tools_executed:
  - read_file
  - draft_email
  - draft_email
  final_contains:
  - 2 reminder
  no_side_effect_before_approval: true
  files_exist:
  - outbox/Overdue_INV-1001.eml
  - outbox/Overdue_INV-1003.eml
workspace_files:
  invoices.csv: 'invoice,client,amount,due_date,status

    INV-1001,Acme Corp,4200.00,2026-05-20,overdue

    INV-1002,Borealis Ltd,1150.00,2026-07-30,open

    INV-1003,Cetus GmbH,890.00,2026-06-01,overdue

    '
